<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>百日AI财富觉醒营 · 14周完整设计</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A54E;
  --gold-light:#E8D89A;
  --gold-dark:#A07830;
  --red:#C0392B;
  --green:#1A7A6D;
  --blue:#2980B9;
  --purple:#8E44AD;
  --gray:#95A5A6;
  --bg:#07070f;
  --card:#111120;
  --card2:#0d0d1a;
  --border:#1e1e30;
  --text:#e8e4de;
  --text-sub:#888;
  --text-dim:#555;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Noto Sans SC',-apple-system,'PingFang SC',sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.8;
  font-size:15px;
}
.page{
  max-width:800px;
  margin:0 auto;
  padding:0 20px 60px;
  position:relative;
}

/* TOP NAV */
.top-nav{
  position:sticky;top:0;z-index:100;
  background:rgba(7,7,15,0.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 16px;
}
.nav-inner{
  max-width:800px;margin:0 auto;
  display:flex;align-items:center;
  overflow-x:auto;scrollbar-width:none;
}
.nav-inner::-webkit-scrollbar{display:none}
.nav-tab{
  flex:1;min-width:0;padding:14px 8px;
  text-align:center;font-size:12px;font-weight:700;
  color:var(--text-sub);letter-spacing:0.5px;
  cursor:pointer;border-bottom:2px solid transparent;
  transition:all .3s;white-space:nowrap;
  text-decoration:none;display:block;
}
.nav-tab.active,.nav-tab:hover{color:var(--gold);border-bottom-color:var(--gold);}

/* Back link */
.back-link{
  display:inline-flex;align-items:center;gap:6px;
  color:var(--text-sub);font-size:13px;text-decoration:none;
  padding:14px 0;transition:color .2s;
}
.back-link:hover{color:var(--gold);}

/* Header */
.header{
  text-align:center;
  padding:32px 0 24px;
  position:relative;z-index:1;
}
.logo-wrap{margin-bottom:14px}
.logo-wrap img{height:44px;filter:drop-shadow(0 2px 12px rgba(201,165,78,0.3))}
.brand-tag{
  display:inline-block;font-size:10px;letter-spacing:4px;color:var(--gold);
  border:1px solid var(--gold);padding:5px 18px;border-radius:2px;
  margin-bottom:20px;font-weight:500;
}
.header h1{
  font-family:'Cormorant Garamond','Noto Sans SC',serif;
  font-size:28px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:6px;letter-spacing:1px;
}
.header .sub{font-size:14px;color:var(--text-sub);font-weight:300;letter-spacing:1px}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;position:relative;z-index:1}
.divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}
.divider-diamond{width:6px;height:6px;background:var(--gold);transform:rotate(45deg)}

/* Formula */
.formula{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:20px 24px;margin-bottom:20px;text-align:center;
  box-shadow:0 2px 16px rgba(0,0,0,0.3);position:relative;z-index:1;
}
.formula-label{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:3px;margin-bottom:8px}
.formula-main{font-size:18px;font-weight:800;line-height:1.6;color:var(--text)}
.formula-main .f-gold{color:var(--gold)}
.formula-main .f-blue{color:#5ba3d0}
.formula-main .f-green{color:#2ecc71}
.formula-main .f-x{color:var(--text-dim);margin:0 8px}
.formula-result{font-size:14px;color:var(--text-sub);margin-top:6px;font-weight:400}

/* Victories */
.victories{display:flex;gap:10px;margin-bottom:20px;position:relative;z-index:1}
.vic{
  flex:1;text-align:center;padding:12px 8px;
  background:var(--card);border-radius:10px;border:1px solid var(--border);
}
.vic-week{font-size:11px;color:var(--text-sub);font-weight:600}
.vic-label{font-size:12px;font-weight:700;margin-top:3px}

/* Tabs */
.tabs{display:flex;gap:8px;margin-bottom:20px;justify-content:center;position:relative;z-index:1}
.tab{
  padding:8px 22px;border-radius:4px;border:1px solid var(--border);
  background:var(--card2);color:var(--text-sub);font-weight:600;font-size:14px;
  cursor:pointer;transition:all 0.2s;letter-spacing:1px;
}
.tab.active{background:var(--gold);color:#000;border-color:var(--gold)}
.tab:hover{border-color:var(--gold);color:var(--gold)}

/* Timeline */
.timeline{display:flex;flex-direction:column;gap:8px;position:relative;z-index:1}
.tl-item{
  display:flex;align-items:center;gap:14px;padding:14px 18px;
  background:var(--card);border-radius:10px;cursor:pointer;
  border:1px solid var(--border);transition:all 0.2s;
}
.tl-item:hover{transform:translateX(4px);border-color:var(--gold);box-shadow:0 2px 12px rgba(201,165,78,0.15)}
.tl-dot{
  min-width:42px;height:42px;border-radius:50%;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:12px;letter-spacing:0.5px;
}
.tl-content{flex:1}
.tl-title{font-size:15px;font-weight:700;color:var(--text);line-height:1.3}
.tl-meta{font-size:12px;color:var(--text-sub);margin-top:2px}
.tl-badges{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.tl-phase{font-size:11px;padding:3px 10px;border-radius:3px;font-weight:600;white-space:nowrap;letter-spacing:0.5px}
.tl-tool{font-size:10px;padding:2px 8px;border-radius:3px;font-weight:600}

/* Detail nav */
.detail-nav{
  display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;justify-content:center;
  position:relative;z-index:1;
}
.dn-btn{
  width:40px;height:40px;border-radius:50%;font-weight:700;font-size:12px;
  cursor:pointer;transition:all 0.2s;
  background:var(--card);color:var(--text-sub);border:1px solid var(--border);
}
.dn-btn.active{color:#fff;border-width:2px}
.dn-btn:hover{transform:scale(1.1);border-color:var(--gold)}

/* Detail card */
.detail-card{
  background:var(--card);border-radius:14px;overflow:hidden;
  border:1px solid var(--border);box-shadow:0 2px 20px rgba(0,0,0,0.4);
  position:relative;z-index:1;
}
.dc-header{padding:22px 26px;color:#fff}
.dc-header-top{display:flex;justify-content:space-between;align-items:center;font-size:12px;opacity:0.8}
.dc-tool-badge{font-size:11px;padding:3px 12px;border-radius:3px;background:rgba(255,255,255,0.15);font-weight:600}
.dc-title{font-size:20px;font-weight:800;line-height:1.3;margin-top:8px}
.dc-body{padding:22px 26px}
.dc-section{margin-bottom:18px}
.dc-label{font-size:12px;font-weight:700;letter-spacing:1.5px;margin-bottom:6px}
.dc-text{font-size:14px;color:#bbb;line-height:1.7}
.dc-must{
  font-size:14px;color:#bbb;line-height:1.7;
  background:#0a1a0f;padding:14px 18px;border-radius:8px;border-left:3px solid #2ecc71;
}
.dc-challenge{
  font-size:13px;color:#aaa;line-height:1.7;
  background:#130a1a;padding:12px 16px;border-radius:8px;border-left:3px solid var(--purple);
}
.dc-book{
  display:flex;align-items:center;gap:12px;padding:14px 18px;
  background:#0a0f1a;border-radius:8px;border:1px solid #1a2a3a;
}
.dc-book-emoji{font-size:22px}
.dc-book-title{font-size:14px;font-weight:700;color:#5ba3d0}
.dc-book-sub{font-size:12px;color:var(--text-sub)}
.dc-empty{text-align:center;padding:40px;color:var(--text-dim);font-size:15px}

/* Speaker tag */
.speaker-tag{
  display:inline-block;font-size:11px;padding:3px 10px;border-radius:3px;
  background:#1a1408;color:var(--gold);font-weight:600;margin-top:8px;
  border:1px solid #2a2010;
}

/* Bottom banner */
.bottom-banner{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:22px;text-align:center;margin-top:24px;position:relative;z-index:1;
  box-shadow:0 2px 16px rgba(0,0,0,0.3);
}
.bb-label{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:3px;margin-bottom:6px}
.bb-main{font-size:16px;font-weight:700;color:var(--text);line-height:1.5}
.bb-sub{font-size:13px;color:var(--text-sub);font-weight:300;margin-top:4px}

/* Footer */
.footer{
  text-align:center;padding:30px 0;position:relative;z-index:1;
}
.footer-line{width:40px;height:1px;background:var(--gold);margin:0 auto 16px}
.footer-logo{height:28px;opacity:0.4;margin-bottom:8px}
.footer-text{font-size:11px;color:#444;letter-spacing:2px}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

  if(state.view === "timeline"){
    html += '<div class="timeline">';

      html += '<div class="tl-item" onclick="selectWeek('+i+')">';
      html += '<div class="tl-dot" style="background:'+w.phaseColor+'">'+w.week+'</div>';

      html += '<div class="tl-title">'+w.title+'</div>';
      html += '<div class="tl-meta">'+w.date+(w.master!=="—"?' · '+w.master:'')+(w.book!=="—"?' · '+w.book:'')+'</div>';

      html += '</div>';
      html += '<div class="tl-badges">';
      html += '<div class="tl-phase" style="background:'+w.phaseColor+'11;color:'+w.phaseColor+'">'+(pl.emoji||'')+' '+w.phase+'</div>';

  if(state.view === "detail"){

      var cls = state.selected===i ? "dn-btn active" : "dn-btn";
      var sty = state.selected===i ? "background:"+wk.phaseColor+";border-color:"+wk.phaseColor+";color:#fff" : "";
      html += '<button class="'+cls+'" style="'+sty+'" onclick="selectDetail('+i+')">'+wk.week+'</button>';
    });
    html += '</div>';

    if(w){
      var pl = phaseLabels[w.phase] || {};
      var sectionLabel = w.phase==="开营"?"开营致辞":(w.phase==="结营"?"毕业寄语":"认知冲击");
