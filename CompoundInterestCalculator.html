  .input-panel {
    background: rgba(255,255,255,0.04);

    border-radius: 20px;

  .input-panel h2 {

    letter-spacing: 2px;

    margin-bottom: 28px;

  }
  .input-grid {
    display: grid;

  input[type="range"]::-webkit-slider-thumb {

  .calc-btn {

  .stat-card:hover { transform: translateY(-4px); border-color: rgba(245,166,35,0.4); }

        <input type="range" id="monthly" min="100" max="20000" step="100" value="1000"
          oninput="document.getElementById('monthly-val').textContent=Number(this.value).toLocaleString()">

      </div>

        <input type="range" id="rate" min="3" max="20" value="8" oninput="document.getElementById('rate-val').textContent=this.value">

      </div>

<script>
// ─── 粒子背景 ───
(function() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H, dots = [];
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  for (let i = 0; i < 80; i++) {
    dots.push({
      x: Math.random() * 1920, y: Math.random() * 1080,
      r: Math.random() * 1.5 + 0.3,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      a: Math.random() * 0.5 + 0.1
    });
  }
  function draw() {
    ctx.clearRect(0, 0, W, H);
    dots.forEach(d => {
      d.x += d.vx; d.y += d.vy;
      if (d.x < 0) d.x = W; if (d.x > W) d.x = 0;
      if (d.y < 0) d.y = H; if (d.y > H) d.y = 0;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(245,166,35,${d.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ─── 格式化金额 ───
function fmt(n) {
  if (n >= 1e8) return (n / 1e8).toFixed(2) + ' 亿';
  if (n >= 1e4) return (n / 1e4).toFixed(1) + ' 万';
  return n.toFixed(0);
}
function fmtFull(n) {
  return Math.round(n).toLocaleString('zh-CN') + ' 元';
}

// ─── 计算核心 ───
function calcCompound(monthly, rate, years) {
  const r = rate / 100 / 12;
  if (r === 0) return monthly * 12 * years;
  return monthly * ((Math.pow(1 + r, years * 12) - 1) / r) * (1 + r);
}

// ─── 主计算 ───
function calculate() {
  const age = parseInt(document.getElementById('age').value);
  const monthly = parseInt(document.getElementById('monthly').value);
  const rate = parseInt(document.getElementById('rate').value);

  const milestones = [10, 20, 30];
  const results = milestones.map(y => ({ year: y, value: calcCompound(monthly, rate, y) }));
  const principal30 = monthly * 12 * 30;

  // 显示结果区
  const sec = document.getElementById('result-section');
  sec.style.display = 'block';
  setTimeout(() => sec.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);

  // ─── 关键数字卡片 ───
  const statsRow = document.getElementById('stats-row');
  statsRow.innerHTML = '';
  results.forEach((r, i) => {
    const gain = ((r.value / (monthly * 12 * r.year) - 1) * 100).toFixed(0);
    const card = document.createElement('div');
    card.className = 'stat-card' + (i === 2 ? ' highlight' : '');
    card.innerHTML = `
      <div class="year-label">${r.year} 年后（${age + r.year} 岁）</div>
      <div class="amount">${fmt(r.value)}</div>
      <div class="gain">↑ 收益 +${gain}%</div>
    `;
    statsRow.appendChild(card);
    setTimeout(() => card.classList.add('revealed'), 300 + i * 200);
  });

  // ─── 主图表 ───
  const chartDom = document.getElementById('main-chart');
  const myChart = echarts.init(chartDom, 'dark');

  const years = Array.from({ length: 31 }, (_, i) => i);
  const compoundData = years.map(y => y === 0 ? 0 : calcCompound(monthly, rate, y));
  const principalData = years.map(y => monthly * 12 * y);

  // 拐点定义：复利总额首次超过本金总额 1.5 倍的那一年
  // 即「收益超过本金 50%」，视觉上是曲线明显抬头的时刻
  let inflectionYear = 20; // fallback
  for (let y = 1; y <= 30; y++) {
    if (principalData[y] > 0 && compoundData[y] / principalData[y] >= 1.5) {
      inflectionYear = y;
      break;
    }
  }

  const option = {
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'axis',
      backgroundColor: 'rgba(10,10,20,0.9)',
      borderColor: 'rgba(245,166,35,0.3)',
      textStyle: { color: '#fff', fontFamily: 'Noto Sans SC' },
      formatter: params => {
        const y = params[0].dataIndex;
        let html = `<div style="font-weight:700;margin-bottom:8px">第 ${y} 年（${age + y} 岁）</div>`;
        params.forEach(p => {
          html += `<div style="color:${p.color}">${p.seriesName}：${fmtFull(p.value)}</div>`;
        });
        return html;
      }
    },
    legend: {
      data: ['复利增长', '仅存本金'],
      textStyle: { color: 'rgba(255,255,255,0.5)', fontFamily: 'Noto Sans SC' },
      top: 0
    },
    grid: { left: '2%', right: '4%', bottom: '10%', top: '14%', containLabel: true },
    xAxis: {
      type: 'category',
      data: years.map(y => `${y}年`),
      axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
      axisLabel: { color: 'rgba(255,255,255,0.4)', fontFamily: 'Noto Sans SC', interval: 4 },
      splitLine: { show: false }
    },
    yAxis: {
      type: 'value',
      axisLabel: {
        color: 'rgba(255,255,255,0.4)',
        fontFamily: 'Noto Sans SC',
        formatter: v => fmt(v)
      },
      splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)' } }
    },
    series: [
      {
        name: '仅存本金',
        type: 'line',
        data: principalData,
        smooth: false,
        lineStyle: { color: 'rgba(255,255,255,0.2)', width: 2, type: 'dashed' },
        itemStyle: { color: 'rgba(255,255,255,0.2)' },
        areaStyle: { color: 'rgba(255,255,255,0.02)' },
        symbol: 'none'
      },
      {
        name: '复利增长',
        type: 'line',
        data: compoundData,
        smooth: true,
        lineStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
            { offset: 0, color: '#f5a623' },
            { offset: 1, color: '#ff6b35' }
          ]),
          width: 3
        },
        itemStyle: { color: '#f5a623' },
        areaStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: 'rgba(245,166,35,0.3)' },
            { offset: 1, color: 'rgba(245,166,35,0.01)' }
          ])
        },
        symbol: 'none',
        markPoint: {
          data: milestones.map((y, idx) => {
            // 标签偏移：拐点年份附近的里程碑向左上偶避
            const isNearInflection = Math.abs(y - inflectionYear) <= 2;
            const offsetX = isNearInflection ? -30 : (idx === 2 ? -14 : 14);
            const offsetY = isNearInflection ? -28 : -20;
            return {
              name: `${y}年`,
              coord: [y, compoundData[y]],
              label: {
                formatter: fmt(compoundData[y]),
                color: '#f5a623',
                fontFamily: 'Noto Sans SC',
                fontSize: 12,
                fontWeight: 700,
                offset: [offsetX, offsetY]
              },
              itemStyle: { color: '#f5a623', borderColor: '#fff', borderWidth: 2 },
              symbol: 'circle',
              symbolSize: 10
            };
          })
        },
        markLine: {
          silent: true,
          symbol: ['none', 'circle'],
          symbolSize: 6,
          data: [
            {
              xAxis: inflectionYear,
              lineStyle: { color: 'rgba(255,107,53,0.7)', type: 'dashed', width: 2 },
              label: { show: false }
            }
          ]
        }
      }
    ],
    animationDuration: 2000,
    animationEasing: 'cubicOut'
  };
  myChart.setOption(option);

  // ─── 拐点解读模块 ───
  const insightEl = document.getElementById('inflection-insight');
  const inflectionValue = compoundData[inflectionYear];
  const inflectionPrincipal = principalData[inflectionYear];
  const earnedAtInflection = inflectionValue - inflectionPrincipal;
  const earnedRatio = ((inflectionValue / inflectionPrincipal - 1) * 100).toFixed(0);

  // 根据拐点早晚生成不同文案
  let meaningText, urgencyText;
  if (inflectionYear <= 7) {
    meaningText = `你的拐点在第 <strong>${inflectionYear} 年</strong>（${age + inflectionYear} 岁）到来。这是一个极好的信号——高年化收益率让复利在很短的时间内就开始显现威力。到那一天，你的收益将超过本金的 ${earnedRatio}%，即已赚到 <strong>${fmt(earnedAtInflection)}</strong>。从那一天起，复利的飞轮将进入真正的加速模式。`;
    urgencyText = '拐点来得很快，不要浪费任何一天';
  } else if (inflectionYear <= 15) {
    meaningText = `你的拐点在第 <strong>${inflectionYear} 年</strong>（${age + inflectionYear} 岁）到来。这是复利的经典节奏——前期看起来平淡，到了第 ${inflectionYear} 年收益首次超过本金的 ${earnedRatio}%，共赚到 <strong>${fmt(earnedAtInflection)}</strong>。大多数人在第 5–8 年看不到明显变化而放弃，正是在拐点前一步放弃的。`;
    urgencyText = '坚持到拐点，是最关键的一步';
  } else if (inflectionYear <= 22) {
    meaningText = `你的拐点在第 <strong>${inflectionYear} 年</strong>（${age + inflectionYear} 岁）到来。这说明当前收益率偏低，复利需要更长的时间发酵。到拐点时你将赚到 <strong>${fmt(earnedAtInflection)}</strong>的收益。最大的优化空间在于提升收益率——即便提升 2–3 个百分点，拐点也能提前 3–5 年到来。`;
    urgencyText = '提升收益率是最快的捷径';
  } else {
    meaningText = `你的拐点在第 <strong>${inflectionYear} 年</strong>（${age + inflectionYear} 岁）到来。当前收益率偏低，复利增速较慢。建议重新评估投资组合，将收益率提升到 6% 以上，拐点将显著提前。即便现在开始，也比一直等待要好得多。`;
    urgencyText = '现在开始永远不晚';
  }

  // 生成拐点提前方案（提升投入、提升收益率、增加年限）
  const adviceCards = [
    {
      icon: '💰',
      title: '方案 A · 加大每月投入',
      body: `将每月投入从 <strong>${monthly.toLocaleString()}</strong> 元提升到 <strong>${(monthly * 1.5).toLocaleString()}</strong> 元（增加50%），30年后总资产可达 <strong>${fmt(calcCompound(monthly * 1.5, rate, 30))}</strong>，相比现方案多出 <strong>${fmt(calcCompound(monthly * 1.5, rate, 30) - results[2].value)}</strong>。`,
      impact: `拐点时间不变，但最终资产提升 50%`
    },
    {
      icon: '📈',
      title: '方案 B · 提升年化收益率',
      body: `将年化收益率从 <strong>${rate}%</strong> 提升到 <strong>${Math.min(rate + 3, 20)}%</strong>（提升 3 个百分点），30年后可达 <strong>${fmt(calcCompound(monthly, Math.min(rate + 3, 20), 30))}</strong>。拐点提前至第 <strong>${(() => { for(let y=1;y<=30;y++){if(principalData[y]>0&&calcCompound(monthly,Math.min(rate+3,20),y)/principalData[y]>=1.5)return y;} return 20; })()} 年</strong>。`,
      impact: `收益率每提升 1%，拐点提前约 1–2 年`
    },
    {
      icon: '⏰',
      title: '方案 C · 延长投资年限',
      body: `将投资周期从 30 年延长至 35 年，年化 ${rate}% 不变，最终资产可达 <strong>${fmt(calcCompound(monthly, rate, 35))}</strong>。多坚持 5 年，资产增加 <strong>${fmt(calcCompound(monthly, rate, 35) - results[2].value)}</strong>。`,
      impact: `时间是复利最大的杖杆`
    },
    {
      icon: '🔄',
      title: '方案 D · 收益再投入',
      body: `将每年收益的 20% 再次投入，形成“复利的复利”。收益越多、再投入越多，拐点将比方案 A 更早到来。这是巧妈难为无米之炊的复利加速器。`,
      impact: `拐点可提前 2–4 年，效果随时间复利增强`
    }
  ];

  insightEl.innerHTML = `
    <div class="insight-block">
      <div class="insight-header">
        <div class="insight-title">◎ 拐点解读</div>
        <div style="font-size:11px;color:rgba(255,107,53,0.8);background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.3);padding:3px 10px;border-radius:20px;">${urgencyText}</div>
      </div>
      <div class="insight-meaning">
        <div class="meaning-label">▶ 这个拐点意味着什么？</div>
        <div class="meaning-text">${meaningText}</div>
      </div>
      <div class="insight-header" style="margin-top:24px;">
        <div class="insight-title">◎ 如何让拐点更早到来？</div>
      </div>
      <div class="advice-grid">
        ${adviceCards.map(c => `
          <div class="advice-card">
            <div class="advice-icon">${c.icon}</div>
            <div class="advice-title">${c.title}</div>
            <div class="advice-body">${c.body}</div>
            <div class="advice-impact">${c.impact}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  // ─── graphic 标注拐点垂线 ───
  // 用 graphic 组件在拐点垂线顶部添加横排标注
  // 先等图表渲染完成再计算坐标
  setTimeout(() => {
    const chartWidth = myChart.getWidth();
    const gridLeft = Math.round(chartWidth * 0.10); // 左边距
    const gridRight = Math.round(chartWidth * 0.04);
    const gridWidth = chartWidth - gridLeft - gridRight;
    const totalYears = 30;
    const xRatio = inflectionYear / totalYears;
    const xPx = gridLeft + Math.round(gridWidth * xRatio);

    myChart.setOption({
      graphic: [
        {
          type: 'group',
          left: xPx - 36,
          top: 16,
          children: [
            {
              type: 'rect',
              shape: { x: 0, y: 0, width: 72, height: 22, r: 4 },
              style: { fill: 'rgba(255,107,53,0.9)' }
            },
            {
              type: 'text',
              style: {
                text: `拐点 第${inflectionYear}年`,
                x: 36, y: 11,
                textAlign: 'center',
                textVerticalAlign: 'middle',
                fill: '#fff',
                font: 'bold 11px "Noto Sans SC", sans-serif'
              }
            }
          ]
        }
      ]
    });
  }, 100);

  window.addEventListener('resize', () => myChart.resize());

  // ─── 对比区 ───
  const compareSection = document.getElementById('compare-section');
  compareSection.innerHTML = `
    <div class="compare-card no-invest">
      <div class="label">如果你一直等待</div>
      <div class="big-num">${fmt(principal30)}</div>
      <div class="desc">30年仅存本金<br>每月 ${monthly.toLocaleString()} 元 × 360 个月</div>
    </div>
    <div class="compare-card with-invest">
      <div class="label">如果你今天就开始</div>
      <div class="big-num">${fmt(results[2].value)}</div>
      <div class="desc">30年复利增长<br>年化 ${rate}% 的魔法</div>
    </div>
  `;

  // ─── 差值 ───
  const diff = results[2].value - principal30;
  const diffBanner = document.getElementById('diff-banner');
  diffBanner.innerHTML = `
    <div class="diff-label">复利为你多创造的财富</div>
    <div class="diff-num">+ ${fmt(diff)}</div>
    <div class="diff-quote">这是你因为「看不起小」而错过的钱。<br>每月只是 ${monthly.toLocaleString()} 元，30年后多出 ${fmt(diff)}。</div>
  `;

  // ─── 每日1%图表 ───
  const dailyDom = document.getElementById('daily-chart');
  const dailyChart = echarts.init(dailyDom, 'dark');
  const days = Array.from({ length: 366 }, (_, i) => i);
  const dailyGrowth = days.map(d => Math.pow(1.01, d));
  const dailyFlat = days.map(() => 1);

  dailyChart.setOption({
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'axis',
      backgroundColor: 'rgba(10,10,20,0.9)',
      borderColor: 'rgba(245,166,35,0.3)',
      textStyle: { color: '#fff', fontFamily: 'Noto Sans SC' },
      formatter: params => {
        const d = params[0].dataIndex;
        // params[0] = '不进步'(恒为1), params[1] = '每天进步1%'
        const growthSeries = params.find(p => p.seriesName === '每天进步1%');
        const val = growthSeries ? growthSeries.value : params[0].value;
        return `第 ${d} 天：<strong style="color:#f5a623">${Number(val).toFixed(2)} 倍</strong>`;
      }
    },
    grid: { left: '2%', right: '4%', bottom: '10%', top: '8%', containLabel: true },
    xAxis: {
      type: 'category',
      data: days.map(d => d + '天'),
      axisLabel: { color: 'rgba(255,255,255,0.4)', fontFamily: 'Noto Sans SC', interval: 60 },
      axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
      splitLine: { show: false }
    },
    yAxis: {
      type: 'value',
      axisLabel: { color: 'rgba(255,255,255,0.4)', fontFamily: 'Noto Sans SC', formatter: v => v + '倍' },
      splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)' } }
    },
    series: [
      {
        name: '不进步',
        type: 'line',
        data: dailyFlat,
        lineStyle: { color: 'rgba(255,255,255,0.15)', width: 1, type: 'dashed' },
        symbol: 'none'
      },
      {
        name: '每天进步1%',
        type: 'line',
        data: dailyGrowth,
        smooth: true,
        lineStyle: { color: '#f5a623', width: 2 },
        areaStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: 'rgba(245,166,35,0.4)' },
            { offset: 1, color: 'rgba(245,166,35,0.01)' }
          ])
        },
        symbol: 'none'
        // 终点标注改用 graphic 组件，避免与图表边缘重叠
      }
    ],
    animationDuration: 2500,
    animationEasing: 'cubicOut'
  });
  // 用 graphic 在每日1%图表右上角绘制独立横排标注，避免 pin 标签重叠
  setTimeout(() => {
    const dw = dailyChart.getWidth();
    const dh = dailyChart.getHeight();
    dailyChart.setOption({
      graphic: [
        // 主标注：37.78倍
        {
          type: 'group',
          right: 8,
          top: 10,
          children: [
            {
              type: 'rect',
              shape: { x: 0, y: 0, width: 88, height: 44, r: 6 },
              style: { fill: 'rgba(245,166,35,0.92)', shadowBlur: 8, shadowColor: 'rgba(245,166,35,0.5)' }
            },
            {
              type: 'text',
              style: {
                text: '37.78 倍',
                x: 44, y: 14,
                textAlign: 'center',
                textVerticalAlign: 'middle',
                fill: '#0a0a0f',
                font: 'bold 15px "Noto Sans SC", sans-serif'
              }
            },
            {
              type: 'text',
              style: {
                text: '第 365 天',
                x: 44, y: 32,
                textAlign: 'center',
                textVerticalAlign: 'middle',
                fill: 'rgba(10,10,15,0.7)',
                font: '11px "Noto Sans SC", sans-serif'
              }
            }
          ]
        },
        // 小圆点标记终点
        {
          type: 'circle',
          right: dw - dailyChart.convertToPixel({ seriesIndex: 1 }, [365, 37.78])[0] + 4,
          top: dailyChart.convertToPixel({ seriesIndex: 1 }, [365, 37.78])[1] - 4,
          shape: { r: 5 },
          style: { fill: '#f5a623', stroke: '#fff', lineWidth: 2 }
        }
      ]
    });
  }, 200);

  window.addEventListener('resize', () => dailyChart.resize());
}
</script>
</body>
</html>
